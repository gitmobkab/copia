site_name: Copia
site_url: https://gitmobkab.github.io/copia/
site_description: Interactive TUI database seeder
site_author: gitmobkab
repo_url: https://github.com/gitmobkab/copia
repo_name: gitmobkab/copia

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - toc.integrate
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.tabs.sticky

hooks:
  - hooks/dsl_hook.py
  - hooks/generators_hook.py
  - hooks/changelog_hook.py

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - CLI: cli.md
  - TUI: tui.md
  - DSL Reference: dsl.md
  - Configuration: configuration/index.md
  - Generators: 
    - generators/index.md
  - Blog:
    - blog/index.md
  - Changelog: changelog.md
    

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

plugins:
  - search
  - meta
  - social:
      cards_layout_options:
        background_color: "#0f1210"
        color: "#e2ece2"
        font_family: JetBrains Mono
  - blog:
      blog_toc: true